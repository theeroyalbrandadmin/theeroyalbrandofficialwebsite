backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "JBG Apparel Inventory"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Product Name", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "string"}
      - {label: "Product Image", name: "image", widget: "image"}
      - {label: "Fabric & Texture Details", name: "details", widget: "string", hint: "e.g., Heavyweight Mineral Wash, Distressed Hems"}
      - {label: "Available Sizes", name: "sizes", widget: "list", default: ["S", "M", "L", "XL", "2XL"]}
      - {label: "Stock Status", name: "stock", widget: "select", options: ["In Stock", "Low Stock", "Pre-Order", "Sold Out"]}
      - {label: "Product Description", name: "body", widget: "markdown"}

  - name: "marketing"
    label: "Marketing Content & Media"
    folder: "content/marketing"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Campaign Name", name: "title", widget: "string"}
      - {label: "YouTube Featured Video Link", name: "video_url", widget: "string"}
      - {label: "Promo Banner Text", name: "banner_text", widget: "string"}